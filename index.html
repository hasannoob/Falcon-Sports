            --text-main: #ffffff;

            --border: #333333;

        body.light-mode {

            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --border: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column; transition: 0.3s;
            user-select: none;
        }

        .hidden { display: none !important; }
        .page { flex: 1; width: 100%; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Branded Loader --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 100000;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-text {
            font-family: 'Orbitron', sans-serif; font-size: 35px; font-weight: 900;
            color: var(--primary); letter-spacing: 10px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        /* --- Header --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: var(--bg-header); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 800; color: #fff; font-style: italic; }
        .brand span { color: var(--primary); }

        /* --- Social Card --- */
        .social-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; margin: 10px 12px;
        }
        .s-btn { background: #0088cc; color: #fff; padding: 6px 15px; border-radius: 4px; font-weight: 800; font-size: 12px; text-decoration: none; }

        /* --- Filter Tabs --- */
        .filter-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px 12px; }
        .tab {
            background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border);
            padding: 10px 0; border-radius: 5px; font-weight: 600; font-size: 12px; cursor: pointer; text-align: center;
        }
        .tab.active { background: var(--border); border-bottom: 2px solid var(--primary); }

        /* --- Match Card (ভিডিওর মতো) --- */
        .match-list { padding: 5px 12px 40px 12px; display: flex; flex-direction: column; gap: 15px; }
        .m-card { background: var(--bg-card); border-radius: 12px; padding: 12px; border: 1px solid var(--border); cursor: pointer; }
        .m-card.live-border { border-color: #39ff14; box-shadow: 0 0 5px rgba(57, 255, 20, 0.1); }

        .mc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; overflow: hidden; }
        .mc-header-left { display: flex; align-items: center; gap: 6px; flex: 1; overflow: hidden; }
        .mc-league-logo { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; background: #fff; border-radius: 3px; }
        
        .scroll-container { flex: 1; overflow: hidden; white-space: nowrap; position: relative; }
        .scroll-text { display: inline-block; font-size: 11px; font-weight: 800; color: #fff; text-transform: uppercase; }
        .scroll-active { animation: rewind 12s linear infinite; }
        @keyframes rewind { 0%, 20% { transform: translateX(0); } 80% { transform: translateX(-100%); } 100% { transform: translateX(0); } }

        .mc-timer { font-size: 11px; font-weight: 800; color: #888; white-space: nowrap; }
        .live-green { color: #39ff14; }

        .mc-body { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; }
        .mc-team { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .mc-logo { width: 45px; height: 45px; object-fit: contain; }
        .mc-team-name { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #fff; }

        .mc-mid-status { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .mc-live-badge { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .blob { width: 10px; height: 10px; background: red; border-radius: 50%; box-shadow: 0 0 8px red; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } }
        .live-text { color: red; font-size: 11px; font-weight: 900; font-family: 'Orbitron'; }

        .mc-footer-chans { display: flex; justify-content: center; gap: 8px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border); }
        .chan-img { width: 26px; height: 26px; border-radius: 50%; background: #fff; padding: 2px; object-fit: contain; border: 1px solid #333; }

        /* --- Premium Match Center --- */
        .det-hero { padding: 35px 15px; text-align: center; background: var(--bg-card); border-bottom: 1px solid var(--border); }
        .det-league-img { width: 65px; height: 65px; object-fit: contain; margin-bottom: 15px; background: #fff; padding: 5px; border-radius: 8px; }
        .det-teams-row { display: flex; align-items: center; justify-content: space-around; max-width: 500px; margin: 0 auto; }
        .det-team img { width: 85px; height: 85px; object-fit: contain; }
        .det-vs { font-family: 'Orbitron'; font-size: 26px; color: var(--primary); font-weight: 900; }
        .det-schedule { display: inline-block; margin-top: 25px; background: var(--primary); color: #000; padding: 10px 25px; border-radius: 30px; font-family: 'Orbitron'; font-size: 10px; font-weight: 900; }

        .server-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; margin: 12px; display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: 0.3s;

        .s-info-row { display: flex; align-items: center; gap: 15px; }
        .s-icon { width: 35px; height: 35px; background: var(--primary); color: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        /* --- Player Area --- */
        .player-bar { padding: 12px 15px; background: #000; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
        #iframe-player { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; display: none; }
        #artplayer-app { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5; }
        .viewer-box { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: #ff4757; text-transform: uppercase; background: rgba(255,255,255,0.05); padding: 8px 18px; border-radius: 20px; border: 1px solid rgba(255,71,87,0.3); margin-top: 20px; }

        /* Quality Modal */
        .art-layer-qualityModal { display: none; position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; width: 280px; max-height: 80%; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 10px; text-align: center; font-weight: bold; color: #fff; background: #222; }
        .modal-body { flex: 1; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 4px; }
        .q-opt { padding: 12px; background: #2b2b2b; color: #ccc; border-radius: 4px; font-size: 14px; display: flex; justify-content: space-between; cursor: pointer; }
        .q-opt.active { background: var(--primary); color: black; font-weight: bold; }
        .modal-close { padding: 12px; text-align: center; color: #ff4757; font-weight: bold; cursor: pointer; background: #222; }

        footer { padding: 25px; background: #000; text-align: center; border-top: 1px solid var(--border); font-size: 11px; color: #555; margin-top: auto; }
    </style>

        function getElapsed(startTime) {
            const diff = new Date() - new Date(startTime);
            if (diff < 0) return "00:00:00";
            const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateFakeViewer() {
            const el = document.getElementById('live-count-num'); if(!el) return;
            let current = parseInt(el.innerText.replace(/,/g, ''));
            let change = Math.floor(Math.random() * 50) - 20;
            el.innerText = Math.max(500, current + change).toLocaleString();
        }

        function renderHome() {
            const container = document.getElementById('match-container'); container.innerHTML = "";
            const now = new Date();

            let filtered = matches.filter(m => {
                const s = new Date(m.matchTime), e = m.matchEndTime ? new Date(m.matchEndTime) : new Date(s.getTime() + 4*3600000);
                if(activeTab === 'live') return (now >= s && now <= e);
                if(activeTab === 'upcoming') return (now < s);
                if(activeTab === 'ended') return (now > e);
                return (now <= e);
            });

            filtered.sort((a,b) => {
                const sA = new Date(a.matchTime), liveA = (now >= sA && now <= (a.matchEndTime ? new Date(a.matchEndTime) : new Date(sA.getTime()+4*3600000)));
                const sB = new Date(b.matchTime), liveB = (now >= sB && now <= (b.matchEndTime ? new Date(b.matchEndTime) : new Date(sB.getTime()+4*3600000)));
                if(liveA && !liveB) return -1;
                if(!liveA && liveB) return 1;
                return sA - sB;
            });

            filtered.forEach(m => {
                const s = new Date(m.matchTime);
                const isLive = (now >= s && now <= (m.matchEndTime ? new Date(m.matchEndTime) : new Date(s.getTime()+4*3600000)));
                const title = `${m.sportType || 'SPORT'} | ${m.leagueTitle}`;
                const isLong = title.length > 25;
                let chans = ""; if(m.streamLinks) m.streamLinks.forEach(l => { if(l.logo) chans += `<img src="${PROXY}${l.logo}" class="chan-img">`; });

                const card = document.createElement('div');
                card.className = `m-card ${isLive ? 'live-border' : ''}`;
                card.innerHTML = `
                    <div class="mc-header">
                        <div class="mc-header-left">
                            <img src="${PROXY}${m.leagueLogo}" class="mc-league-logo" onerror="this.style.display='none'">
                            <div class="scroll-container"><span class="scroll-text ${isLong ? 'scroll-active' : ''}">${title}</span></div>
                        </div>
                        <div class="mc-timer ${isLive ? 'live-green' : ''}">${isLive ? 'Started ' + getElapsed(m.matchTime) : s.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                    <div class="mc-body">
                        <div class="mc-team"><img src="${PROXY}${m.team1Logo}" class="mc-logo"><span class="mc-team-name">${m.team1Name}</span></div>
                        <div class="mc-mid-status">${isLive ? '<div class="mc-live-badge"><div class="blob"></div><span class="live-text">LIVE</span></div>' : '<span class="vs-text">VS</span>'}</div>
                        <div class="mc-team"><img src="${PROXY}${m.team2Logo || m.teamZLogo}" class="mc-logo"><span class="mc-team-name">${m.team2Name}</span></div>
                    </div>
                    <div class="mc-footer-chans">${chans}</div>
                `;
                card.onclick = () => switchPage('details', m);
                container.appendChild(card);
            });
        }

        function setTab(tab, btn) { activeTab = tab; document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); btn.classList.add('active'); renderHome(); }

        function switchPage(id, data = null) {
            if (!history.state || history.state.page !== id) history.pushState({page: id, data: data}, "", "#" + id);
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            window.scrollTo(0,0);

            if(id === 'details') {
                const s = new Date(data.matchTime);
                document.getElementById('details-content').innerHTML = `

                    linkBox.appendChild(btn);
                });
            }

            if(id === 'player') {
                document.getElementById('player-match-name').innerText = data.name;
                if(counterInterval) clearInterval(counterInterval);
                let base = data.sport?.toLowerCase().includes('cricket') ? 5200 : (data.sport?.toLowerCase().includes('football') ? 8500 : 1200);
                document.getElementById('live-count-num').innerText = (base + Math.floor(Math.random()*500)).toLocaleString();
                counterInterval = setInterval(updateFakeViewer, 45000);
                initHybridPlayer(data.link, data.api);
            } else { if(art) art.destroy(); if(counterInterval) clearInterval(counterInterval); document.getElementById('iframe-player').src = ""; }
        }

        function initHybridPlayer(url, drm) {
            const artEl = document.getElementById('artplayer-app'), iframeEl = document.getElementById('iframe-player');
            if(art) art.destroy(); iframeEl.src = ""; iframeEl.style.display = 'none'; artEl.style.display = 'none';

            const isStream = url.includes(".m3u8") || url.includes(".mpd") || url.includes(".mp4");
            const isIframe = url.includes("<iframe") || url.includes("circleplay.top") || url.includes("futbol");

            if (isStream && !isIframe) {
                artEl.style.display = 'block'; qualityLevelsData = []; currentQualityIndex = -1;
                art = new Artplayer({
                    container: '#artplayer-app', url: url, autoplay: true, fullscreen: true, pip: true, theme: '#00ff88',
                    layers: [{ name: 'qualityModal', html: `<div class="modal-box"><div class="modal-header">Quality Selection</div><div class="modal-body" id="qList"></div><div class="modal-close" id="qClose">Close</div></div>` }],
                    controls: [
                        { name: 'qualityBtn', position: 'right', html: playerIcons.gear, index: 10, click: () => buildQualityUI() },
                        { name: 'audioList', position: 'right', html: playerIcons.globe, index: 11, selector: [] },
                        { name: 'aspectRatio', position: 'right', html: playerIcons.aspect, index: 12, selector: [{html:'Default',url:'default',default:true},{html:'16:9',url:'16:9'},{html:'4:3',url:'4:3'}], onSelect: (i)=>art.aspectRatio=i.url }
                    ],
                    customType: {
                        mpd: (video, url, art) => {
                            const p = dashjs.MediaPlayer().create(); p.initialize(video, url, true);
                            if(drm && drm.includes(':')) { const [k, v] = drm.split(':'); p.setProtectionData({ "org.w3.clearkey": { "clearkeys": { [k]: v } } }); }
                            p.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                                const tracks = p.getTracksFor('audio');
                                const list = tracks.map((t, i) => ({ default: t === p.getCurrentTrackFor('audio'), html: t.lang || `Audio ${i+1}`, index: t }));
                                art.controls.update({ name: 'audioList', html: playerIcons.globe, selector: list, onSelect: (item) => { p.setCurrentTrack(item.index); return playerIcons.globe; } });
                                qualityLevelsData = p.getBitrateInfoListFor('video').map((q, i) => ({ height: q.height, bitrate: Math.round(q.bitrate/1000)+'kbps', index: i }));
                                setQualityFunction = (idx) => { if(idx===-1) p.updateSettings({'streaming':{'abr':{'autoSwitchBitrate':{'video':true}}}}); else { p.updateSettings({'streaming':{'abr':{'autoSwitchBitrate':{'video':false}}}}); p.setQualityFor('video', idx); } currentQualityIndex = idx; };
                            });
                        },
                        m3u8: (video, url, art) => {
                            if (Hls.isSupported()) {
                                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                    const list = hls.audioTracks.map((t, i) => ({ html: t.name || t.lang || `Audio ${i+1}`, index: i, default: i === hls.audioTrack }));
                                    art.controls.update({ name: 'audioList', html: playerIcons.globe, selector: list, onSelect: (item) => { hls.audioTrack = item.index; return playerIcons.globe; } });
                                    qualityLevelsData = hls.levels.map((l, i) => ({ height: l.height, bitrate: Math.round(l.bitrate/1000)+'kbps', index: i }));
                                    setQualityFunction = (idx) => { hls.currentLevel = idx; currentQualityIndex = idx; };
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; }
                        }
                    }
                });
                art.on('ready', () => { const l = art.layers.qualityModal; l.querySelector('#qClose').onclick = (e) => { e.stopPropagation(); l.style.display = 'none'; }; });
            } else {
                iframeEl.style.display = 'block';
                if(url.includes("<iframe")) { const t = document.createElement('div'); t.innerHTML = url; iframeEl.src = t.querySelector('iframe').src; } else { iframeEl.src = url; }
            }
        }

        function buildQualityUI() {
            if(qualityLevelsData.length === 0) return;
            const m = art.layers.qualityModal, list = m.querySelector('#qList'); list.innerHTML = `<div class="q-opt ${currentQualityIndex===-1?'active':''}" onclick="applyQ(-1)"><span>Auto</span><span>Adaptive</span></div>`;
            [...qualityLevelsData].reverse().forEach(lvl => {
                const opt = document.createElement('div'); opt.className = `q-opt ${currentQualityIndex===lvl.index?'active':''}`;
                opt.innerHTML = `<span>${lvl.height}p</span><span>${lvl.bitrate}</span>`; opt.onclick = () => applyQ(lvl.index); list.appendChild(opt);
            });
            m.style.display = 'flex';
        }

        function applyQ(idx) { if(setQualityFunction) setQualityFunction(idx); art.layers.qualityModal.style.display='none'; }

        window.onpopstate = (e) => {
            const pageId = (e.state && e.state.page) ? e.state.page : 'home';
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            if(pageId !== 'player') { if(art) art.destroy(); document.getElementById('iframe-player').src = ""; }
        };

        window.onload = () => {
            db.ref('/').on('value', (snap) => {
                const data = snap.val(); if(data && data.matches) { matches = Object.values(data.matches); renderHome(); document.getElementById('loader').style.display='none'; }
            });
            setInterval(() => { if(activeTab === 'all' || activeTab === 'live') renderHome(); }, 1000);
            if(!history.state) history.replaceState({page: 'home'}, "", "#home");
        };
    </script>
</body>
</html>
