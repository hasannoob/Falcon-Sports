<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Sports - Official Live Streaming</title>
    
    <!-- External Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --header-bg: rgba(15, 23, 42, 0.9);
        }

        body.light-mode {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --header-bg: rgba(255, 255, 255, 0.95);
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Inter', sans-serif; 
            color: var(--text-main); 
            transition: background 0.3s ease;
            -webkit-tap-highlight-color: transparent; 
        }
        
        .tab-btn { padding: 12px 6px; font-weight: 700; font-size: 11px; cursor: pointer; color: var(--text-muted); border-bottom: 3px solid transparent; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { color: #e11d48; border-bottom-color: #e11d48; background: rgba(225, 29, 72, 0.05); }
        
        .match-card { background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .match-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2); }
        
        .status-badge { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; display: flex; align-items: center; gap: 4px; white-space: nowrap; }
        .live-pulse { height: 7px; width: 7px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .league-info { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; overflow: hidden; flex: 1; }
        .league-info img { width: 22px; height: 22px; object-fit: contain; background: rgba(255,255,255,0.1); padding: 2px; border-radius: 4px; flex-shrink: 0; }
        .league-title-wrapper { overflow: hidden; white-space: nowrap; flex: 1; position: relative; }
        .league-title-scroll { display: inline-block; white-space: nowrap; animation: league-marquee 10s linear infinite; padding-right: 50px; }
        @keyframes league-marquee {
            0% { transform: translateX(0); }
            15% { transform: translateX(0); }
            85% { transform: translateX(-50%); }
            100% { transform: translateX(-50%); }
        }

        .theme-toggle { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); transition: 0.3s; }

        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .hidden { display: none; }
        .glass-header { background: var(--header-bg); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-color); }
        
        .broadcaster-tag { background: var(--bg-color); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        
        .player-title-container { width: 150px; overflow: hidden; white-space: nowrap; }
        .player-title-marquee { display: inline-block; animation: player-marquee 10s linear infinite; }
        @keyframes player-marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        footer { border-top: 1px solid var(--border-color); width: 100%; }
    </style>
</head>
<body class="dark-mode">

    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2" onclick="location.reload()" style="cursor:pointer">
                <div class="w-9 h-9 bg-rose-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-rose-900/20">
                    <i class="fas fa-play text-base ml-0.5"></i>
                </div>
                <div class="text-xl font-black italic tracking-tighter leading-none uppercase">FALCON<span class="text-rose-600">SPORTS</span></div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="theme-toggle" id="theme-icon"><i class="fas fa-sun"></i></button>
                <a href="https://t.me/falconsports1" class="bg-rose-600 text-white px-3 py-1.5 rounded-full text-[9px] font-black tracking-widest flex items-center gap-1.5 shadow-md">
                    <i class="fab fa-telegram-plane"></i> JOIN
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 min-h-screen">
        
        <div id="home-tabs" class="flex bg-[var(--card-bg)] rounded-2xl shadow-sm border border-[var(--border-color)] mb-6 overflow-hidden p-1">
            <div class="tab-btn flex-1 text-center active rounded-xl" onclick="switchTab('all', this)">All</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('live', this)">Live</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('upcoming', this)">Upcoming</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('finished', this)">Finished</div>
        </div>

        <div id="date-context" class="mb-5 px-1 flex justify-between items-center">
            <span class="text-[9px] font-black text-slate-500 uppercase tracking-[2px]">Match Schedule</span>
            <span id="today-date-str" class="text-[9px] font-bold text-rose-500 bg-rose-500/10 px-2 py-1 rounded-full uppercase"></span>
        </div>

        <div id="list-view" class="space-y-4">
            <div class="text-center py-20 text-slate-500 font-bold uppercase tracking-widest text-[10px]">Syncing Data...</div>
        </div>

        <div id="details-view" class="hidden">
            <button onclick="goBack()" class="text-slate-500 font-bold mb-6 flex items-center gap-2 text-[10px] hover:text-rose-600 transition uppercase tracking-widest">
                <i class="fas fa-arrow-left"></i> Back to Schedule
            </button>
            
            <div class="bg-[var(--card-bg)] rounded-[35px] border border-[var(--border-color)] overflow-hidden">
                <div class="p-10 text-center border-b border-[var(--border-color)] bg-gradient-to-b from-white/5 to-transparent">
                    <div class="flex items-center justify-center gap-2 mb-6">
                        <img id="det-league-img" src="" class="w-6 h-6 object-contain">
                        <span id="det-league-name" class="text-[10px] font-black text-slate-400 uppercase tracking-[4px]"></span>
                    </div>
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex-1">
                            <img id="det-t1-img" src="" class="w-20 h-20 mx-auto object-contain mb-4">
                            <p id="det-t1-name" class="font-black text-sm uppercase"></p>
                        </div>
                        <div class="text-2xl font-black text-slate-700 italic">VS</div>
                        <div class="flex-1">
                            <img id="det-t2-img" src="" class="w-20 h-20 mx-auto object-contain mb-4">
                            <p id="det-t2-name" class="font-black text-sm uppercase"></p>
                        </div>
                    </div>
                    <div id="det-time-box" class="mt-10 inline-block bg-rose-600 text-white px-8 py-3 rounded-2xl text-[10px] font-bold tracking-widest uppercase shadow-lg"></div>
                </div>
                
                <div class="p-6 border-b border-[var(--border-color)] bg-rose-600/5">
                    <h3 class="text-[9px] font-black text-rose-500 mb-4 tracking-[2px] uppercase">Direct High Speed Link</h3>
                    <a href="https://www.effectivegatecpm.com/zdqc4sm7qt?key=2ee33388356594706e35bcca2fde65ed" class="flex items-center justify-between p-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white rounded-[20px] font-bold text-xs shadow-xl active:scale-95 transition-all">
                        <span><i class="fas fa-bolt mr-3"></i> PREMIUM SERVER (NO ADS)</span>
                        <i class="fas fa-external-link-alt opacity-70"></i>
                    </a>
                </div>

                <div class="p-6 border-b border-[var(--border-color)]">
                    <h3 class="text-[9px] font-black text-slate-500 mb-4 tracking-[2px] uppercase">Official Broadcasters</h3>
                    <div id="broadcaster-list" class="flex flex-wrap gap-3"></div>
                </div>
                <div class="p-6">
                    <h3 class="text-[9px] font-black text-slate-500 mb-4 tracking-[2px] uppercase">Stream Servers</h3>
                    <div id="server-list" class="grid grid-cols-1 gap-3"></div>
                </div>
            </div>
        </div>

        <footer id="main-footer" class="mt-12 py-10 text-center">
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-[3px]">
                Copyright &copy; 2025 <span class="text-rose-600">Falcon Sports</span>
            </p>
            <p class="text-[8px] font-bold text-slate-600 uppercase tracking-widest mt-2">
                All Rights Reserved. High Performance Streaming Portal.
            </p>
        </footer>
    </main>

    <!-- PLAYER OVERLAY -->
    <div id="player-overlay">
        <div class="bg-black text-white">
            <div class="flex items-center justify-between p-3 border-b border-white/10">
                <div class="flex items-center gap-4">
                    <button onclick="goBack()" class="text-lg"><i class="fas fa-arrow-left"></i></button>
                    <div>
                        <div class="player-title-container">
                            <span id="player-match-title" class="text-xs font-bold player-title-marquee">Live Stream</span>
                        </div>
                        <div class="flex items-center gap-1.5 text-rose-500 font-black text-[9px] uppercase tracking-tighter">
                            <span class="live-pulse"></span> <span id="player-viewer-count">12,450</span> Watching
                        </div>
                    </div>
                </div>
                <div class="text-[8px] font-black bg-rose-600 text-white px-2 py-1 rounded">ULTRA HD</div>
            </div>
        </div>
        <div id="artplayer" style="width: 100%; height: calc(100% - 60px);"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcROeTFNV6haP8ZrnIFH2iuC9oNS6Ccvc",
            authDomain: "live-bd-24.firebaseapp.com",
            databaseURL: "https://live-bd-24-default-rtdb.firebaseio.com",
            projectId: "live-bd-24",
            storageBucket: "live-bd-24.firebasestorage.app",
            messagingSenderId: "171477012668",
            appId: "1:171477012668:web:f2e694da9474ef236e40b9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allMatches = [];
        let leaguePlaylists = {};
        let currentFilter = 'all';
        let art = null;

        // --- Navigation Logic Fix ---
        window.history.replaceState({page: 'home'}, "");
        window.onpopstate = function(event) {
            if (event.state) {
                if (event.state.page === 'home') renderHomeUI();
                else if (event.state.page === 'details') renderDetailsUI(event.state.matchId, false);
            } else {
                renderHomeUI();
            }
        };

        function goBack() { window.history.back(); }

        function toggleTheme() {
            const body = document.body;
            const icon = document.querySelector('#theme-icon i');
            if (body.classList.contains('light-mode')) {
                body.classList.remove('light-mode'); icon.className = 'fas fa-sun'; localStorage.setItem('theme', 'dark');
            } else {
                body.classList.add('light-mode'); icon.className = 'fas fa-moon'; localStorage.setItem('theme', 'light');
            }
        }
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('#theme-icon i').className = 'fas fa-moon';
        }

        document.getElementById('today-date-str').innerText = new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

        function getElapsed(startTime) {
            const start = new Date(startTime); const now = new Date(); const diff = now - start;
            if(diff < 0) return "00:00";
            const h = Math.floor(diff / 3600000); const m = Math.floor((diff % 3600000) / 60000); const s = Math.floor((diff % 60000) / 1000);
            return (h > 0 ? h + ":" : "") + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        setInterval(() => {
            document.querySelectorAll('.live-timer-span').forEach(el => {
                el.innerText = getElapsed(el.getAttribute('data-start'));
            });
        }, 1000);

        database.ref('/').on('value', snap => {
            const data = snap.val();
            allMatches = data.matches ? Object.values(data.matches) : [];
            leaguePlaylists = data.league_playlists || {};
            renderMatches();
        });

        function switchTab(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMatches();
        }

        // --- উন্নত সর্টিং লজিক ---
        function renderMatches() {
            const container = document.getElementById('list-view');
            container.innerHTML = "";
            const now = new Date();

            // ১. প্রথমে ফিল্টার করা
            let filtered = allMatches.filter(m => {
                const start = new Date(m.matchTime); const end = new Date(m.matchEndTime);
                if (currentFilter === 'live') return now >= start && now <= end;
                if (currentFilter === 'upcoming') return now < start;
                if (currentFilter === 'finished') return now > end;
                return true; 
            });

            // ২. স্ট্যাটাস এবং সময় অনুযায়ী সর্ট করা
            filtered.sort((a, b) => {
                const startA = new Date(a.matchTime);
                const endA = new Date(a.matchEndTime);
                const startB = new Date(b.matchTime);
                const endB = new Date(b.matchEndTime);

                // Priority Logic: Live=1, Upcoming=2, Finished=3
                const getPriority = (start, end) => {
                    if (now >= start && now <= end) return 1; // Live
                    if (now < start) return 2; // Upcoming
                    return 3; // Finished
                };

                const priorityA = getPriority(startA, endA);
                const priorityB = getPriority(startB, endB);

                if (priorityA !== priorityB) {
                    return priorityA - priorityB; // স্ট্যাটাস অনুযায়ী সর্ট
                }
                
                // যদি স্ট্যাটাস এক হয়, তবে সময় অনুযায়ী (Ascending)
                return startA - startB;
            });

            // ৩. রেন্ডার করা
            filtered.forEach(m => {
                const start = new Date(m.matchTime); const end = new Date(m.matchEndTime);
                const isLive = now >= start && now <= end; const isFinished = now > end;
                let liveStatusStr = isLive ? `<span class="status-badge bg-rose-500/10 text-rose-500"><span class="live-pulse"></span>Live <span class="live-timer-span" data-start="${m.matchTime}">${getElapsed(m.matchTime)}</span></span>` : 
                            (isFinished ? `<span class="status-badge bg-slate-500/10 text-slate-500">Finished</span>` : 
                            `<span class="status-badge bg-blue-500/10 text-blue-500">Upcoming</span>`);

                const timeStr = start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = start.toLocaleDateString([], { day: 'numeric', month: 'short' });

                container.innerHTML += `
                    <div class="match-card p-5" onclick="showDetails('${m.id}')">
                        <div class="flex justify-between items-center gap-4 mb-5">
                            <div class="league-info">
                                <img src="${m.leagueLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5351/5351315.png'">
                                <div class="league-title-wrapper"><span class="league-title-scroll">${m.leagueTitle}</span></div>
                            </div>
                            ${liveStatusStr}
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col items-center gap-2 w-[42%]"><img src="${m.team1Logo}" class="w-11 h-11 object-contain"><span class="font-black text-[10px] text-center uppercase truncate w-full">${m.team1Name}</span></div>
                            <div class="text-[10px] font-black text-slate-600 italic">VS</div>
                            <div class="flex flex-col items-center gap-2 w-[42%]"><img src="${m.team2Logo}" class="w-11 h-11 object-contain"><span class="font-black text-[10px] text-center uppercase truncate w-full">${m.team2Name}</span></div>
                        </div>
                        <div class="mt-5 pt-3 border-t border-[var(--border-color)] flex justify-between items-center">
                            <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">${dateStr} • ${timeStr}</span>
                            <span class="text-[8px] font-black text-rose-500 uppercase tracking-widest">Match Details <i class="fas fa-chevron-right ml-1"></i></span>
                        </div>
                    </div>`;
            });
        }

        function showDetails(id) {
            window.history.pushState({page: 'details', matchId: id}, "");
            renderDetailsUI(id);
        }

        function renderDetailsUI(id, stopPlayer = true) {
            const m = allMatches.find(x => x.id == id);
            if(!m) return;
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('home-tabs').classList.add('hidden');
            document.getElementById('date-context').classList.add('hidden');
            document.getElementById('details-view').classList.remove('hidden');
            document.getElementById('player-overlay').style.display = 'none';
            if (stopPlayer && art) { art.destroy(); art = null; }

            document.getElementById('det-league-name').innerText = m.leagueTitle;
            document.getElementById('det-league-img').src = m.leagueLogo;
            document.getElementById('det-t1-name').innerText = m.team1Name;
            document.getElementById('det-t2-name').innerText = m.team2Name;
            document.getElementById('det-t1-img').src = m.team1Logo;
            document.getElementById('det-t2-img').src = m.team2Logo;
            document.getElementById('det-time-box').innerText = new Date(m.matchTime).toLocaleString('en-US', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).toUpperCase();

            const bList = document.getElementById('broadcaster-list'); bList.innerHTML = "";
            let foundChans = [];
            const cat = leaguePlaylists[m.sportType || "FOOTBALL"];
            if(cat) { Object.values(cat).forEach(it => { if(it.league && m.leagueTitle.toLowerCase().includes(it.league.toLowerCase())) foundChans = it.channels || []; }); }
            if(foundChans.length > 0) { foundChans.forEach(ch => { bList.innerHTML += `<div class="broadcaster-tag"><i class="fas fa-tv"></i> ${ch.name}</div>`; }); } 
            else { bList.innerHTML = `<span class="text-[9px] text-slate-500 italic">No listing available</span>`; }

            const sList = document.getElementById('server-list'); sList.innerHTML = "";
            if(!m.streamLinks) {
                sList.innerHTML = `<div class="p-5 bg-rose-500/10 text-rose-500 rounded-[24px] text-[9px] font-black text-center uppercase tracking-widest">Coming Soon...</div>`;
            } else {
                m.streamLinks.forEach((l, i) => {
                    sList.innerHTML += `<button onclick="startStreaming('${l.link}', '${m.team1Name} vs ${m.team2Name}', '${m.id}')" class="flex items-center justify-between p-4 bg-rose-600 text-white rounded-[20px] font-bold text-xs shadow-lg active:scale-95 transition-all"><span><i class="fas fa-play-circle mr-3"></i> ${l.name || 'SERVER ' + (i + 1)}</span><i class="fas fa-chevron-right opacity-50"></i></button>`;
                });
            }
            window.scrollTo(0,0);
        }

        function renderHomeUI() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('home-tabs').classList.remove('hidden');
            document.getElementById('date-context').classList.remove('hidden');
            document.getElementById('details-view').classList.add('hidden');
            document.getElementById('player-overlay').style.display = 'none';
            if (art) { art.destroy(); art = null; }
        }

        function startStreaming(url, title, matchId) {
            window.history.pushState({page: 'details', matchId: matchId}, "");
            document.getElementById('player-match-title').innerText = title;
            document.getElementById('player-overlay').style.display = 'block';
            if (art) art.destroy();
            art = new Artplayer({
                container: '#artplayer', url: url, type: 'm3u8',
                customType: { m3u8: (video, url) => { if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); } else { video.src = url; } } },
                autoplay: true, fullscreen: true, theme: '#e11d48',
            });
        }
    </script>
</body>
</html>
