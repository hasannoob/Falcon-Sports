<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Sports - Official Live Streaming</title>
    
    <!-- External Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        /* Navigation Tabs */
        .tab-btn { padding: 12px 6px; font-weight: 700; font-size: 11px; cursor: pointer; color: #64748b; border-bottom: 3px solid transparent; transition: 0.3s; text-transform: uppercase; }
        .tab-btn.active { color: #e11d48; border-bottom-color: #e11d48; background: rgba(225, 29, 72, 0.03); }
        
        /* Match Card Premium UI */
        .match-card { background: white; border-radius: 20px; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .match-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.08); border-color: #cbd5e1; }
        
        .status-badge { font-size: 9px; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
        .live-pulse { height: 7px; width: 7px; background-color: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .league-info { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .league-info img { width: 22px; height: 22px; object-fit: contain; background: #f1f5f9; padding: 2px; border-radius: 4px; }

        /* Player & Layouts */
        #player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; }
        .hidden { display: none; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-bottom: 1px solid #e2e8f0; }
        
        /* Broadcaster Tags */
        .broadcaster-tag { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 14px; border-radius: 12px; font-size: 11px; font-weight: 700; color: #334155; display: flex; align-items: center; gap: 8px; }
        
        /* Footer Style */
        footer { border-top: 1px solid #e2e8f0; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2" onclick="location.reload()" style="cursor:pointer">
                <div class="w-9 h-9 bg-rose-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-rose-200">
                    <i class="fas fa-play text-base ml-0.5"></i>
                </div>
                <div class="text-xl font-black italic tracking-tighter leading-none uppercase">FALCON<span class="text-rose-600">SPORTS</span></div>
            </div>
            <!-- Small Telegram Button -->
            <a href="https://t.me/falconsports1" class="bg-rose-900 text-white px-3 py-1.5 rounded-full text-[9px] font-black tracking-widest flex items-center gap-1.5 shadow-md">
                <i class="fab fa-telegram-plane"></i> Join Now
            </a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        
        <!-- Tab Navigation -->
        <div id="home-tabs" class="flex bg-white rounded-2xl shadow-sm border border-slate-200 mb-6 overflow-hidden p-1">
            <div class="tab-btn flex-1 text-center active rounded-xl" onclick="switchTab('all', this)">All</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('live', this)">Live</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('upcoming', this)">Upcoming</div>
            <div class="tab-btn flex-1 text-center rounded-xl" onclick="switchTab('finished', this)">Finished</div>
        </div>

        <!-- Date Tracker -->
        <div id="date-context" class="mb-5 px-1 flex justify-between items-center">
            <span class="text-[9px] font-black text-slate-300 uppercase tracking-[2px]">Match Schedule</span>
            <span id="today-date-str" class="text-[9px] font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded-full uppercase"></span>
        </div>

        <!-- MATCH LIST VIEW -->
        <div id="list-view" class="space-y-4">
            <div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[10px]">Syncing Data...</div>
        </div>

        <!-- MATCH DETAILS VIEW -->
        <div id="details-view" class="hidden">
            <button onclick="showHome()" class="text-slate-500 font-bold mb-6 flex items-center gap-2 text-[10px] hover:text-rose-600 transition uppercase tracking-widest">
                <i class="fas fa-arrow-left"></i> Back to Schedule
            </button>
            
            <div class="bg-white rounded-[35px] border border-slate-200 overflow-hidden shadow-sm">
                <div class="p-10 text-center border-b border-slate-100 bg-gradient-to-b from-slate-50/50 to-white">
                    <div class="flex items-center justify-center gap-2 mb-6">
                        <img id="det-league-img" src="" class="w-6 h-6 object-contain">
                        <span id="det-league-name" class="text-[10px] font-black text-slate-400 uppercase tracking-[4px]"></span>
                    </div>
                    <div class="flex items-center justify-between gap-2">
                        <div class="flex-1">
                            <img id="det-t1-img" src="" class="w-20 h-20 mx-auto object-contain mb-4">
                            <p id="det-t1-name" class="font-black text-sm text-slate-800 uppercase"></p>
                        </div>
                        <div class="text-2xl font-black text-slate-100 italic">VS</div>
                        <div class="flex-1">
                            <img id="det-t2-img" src="" class="w-20 h-20 mx-auto object-contain mb-4">
                            <p id="det-t2-name" class="font-black text-sm text-slate-800 uppercase"></p>
                        </div>
                    </div>
                    <div id="det-time-box" class="mt-10 inline-block bg-slate-900 text-white px-8 py-3 rounded-2xl text-[10px] font-bold tracking-widest uppercase"></div>
                </div>
                <div class="p-6 border-b border-slate-50">
                    <h3 class="text-[9px] font-black text-slate-400 mb-4 tracking-[2px] uppercase">Official Broadcasters</h3>
                    <div id="broadcaster-list" class="flex flex-wrap gap-3"></div>
                </div>
                <div class="p-6 bg-slate-50/30">
                    <h3 class="text-[9px] font-black text-slate-400 mb-4 tracking-[2px] uppercase">Stream Servers</h3>
                    <div id="server-list" class="grid grid-cols-1 gap-3"></div>
                </div>
            </div>
        </div>

        <!-- FOOTER: Copyright Section -->
        <footer id="main-footer" class="mt-12 py-10 text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[3px]">
                Copyright &copy; 2025 <span class="text-rose-600">Falcon Sports</span>
            </p>
            <p class="text-[8px] font-bold text-slate-300 uppercase tracking-widest mt-2">
                All Rights Reserved. High Performance Streaming Portal.
            </p>
        </footer>

    </main>

    <!-- PLAYER OVERLAY -->
    <div id="player-overlay">
        <div class="bg-black text-white">
            <div class="flex items-center justify-between p-3 border-b border-white/10">
                <div class="flex items-center gap-4">
                    <button onclick="closePlayer()" class="text-lg"><i class="fas fa-arrow-left"></i></button>
                    <div>
                        <span id="player-match-title" class="text-xs font-bold block truncate max-w-[150px]">Live Stream</span>
                        <div class="flex items-center gap-1.5 text-rose-500 font-black text-[9px] uppercase tracking-tighter">
                            <span class="live-pulse"></span> <span id="player-viewer-count">12,450</span> Watching Now
                        </div>
                    </div>
                </div>
                <div class="text-[8px] font-black bg-rose-600/20 text-rose-500 px-2 py-1 rounded">ULTRA HD</div>
            </div>
        </div>
        <div id="artplayer" style="width: 100%; height: calc(100% - 60px);"></div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBcROeTFNV6haP8ZrnIFH2iuC9oNS6Ccvc",
            authDomain: "live-bd-24.firebaseapp.com",
            databaseURL: "https://live-bd-24-default-rtdb.firebaseio.com",
            projectId: "live-bd-24",
            storageBucket: "live-bd-24.firebasestorage.app",
            messagingSenderId: "171477012668",
            appId: "1:171477012668:web:f2e694da9474ef236e40b9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allMatches = [];
        let leaguePlaylists = {};
        let currentFilter = 'all';

        document.getElementById('today-date-str').innerText = new Date().toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });

        // Elapsed Live Time Logic
        function getElapsed(startTime) {
            const start = new Date(startTime);
            const now = new Date();
            const diff = now - start;
            if(diff < 0) return "00:00";
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            return (h > 0 ? h + ":" : "") + (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
        }

        setInterval(() => {
            document.querySelectorAll('.live-timer-span').forEach(el => {
                const start = el.getAttribute('data-start');
                el.innerText = getElapsed(start);
            });
        }, 1000);

        database.ref('/').on('value', snap => {
            const data = snap.val();
            allMatches = data.matches ? Object.values(data.matches) : [];
            leaguePlaylists = data.league_playlists || {};
            renderMatches();
        });

        function switchTab(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMatches();
        }

        function renderMatches() {
            const container = document.getElementById('list-view');
            container.innerHTML = "";
            const now = new Date();

            let filtered = allMatches.filter(m => {
                const start = new Date(m.matchTime);
                const end = new Date(m.matchEndTime);
                if (currentFilter === 'live') return now >= start && now <= end;
                if (currentFilter === 'upcoming') return now < start;
                if (currentFilter === 'finished') return now > end;
                return true; 
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold uppercase tracking-widest text-[9px]">No Matches scheduled</div>`;
                return;
            }

            // Correct Serial Sorter (Live > Upcoming > Finished)
            filtered.sort((a, b) => {
                const now = new Date();
                const startA = new Date(a.matchTime); const endA = new Date(a.matchEndTime);
                const startB = new Date(b.matchTime); const endB = new Date(b.matchEndTime);
                function getW(s, e) { if(now >= s && now <= e) return 1; if(now < s) return 2; return 3; }
                const wA = getW(startA, endA); const wB = getW(startB, endB);
                if(wA !== wB) return wA - wB;
                if(wA === 3) return startB - startA;
                return startA - startB;
            });

            filtered.forEach(m => {
                const start = new Date(m.matchTime);
                const end = new Date(m.matchEndTime);
                const isLive = now >= start && now <= end;
                const isFinished = now > end;

                let liveStatusStr = isLive ? `<span class="status-badge bg-rose-50 text-rose-600"><span class="live-pulse"></span>Live <span class="live-timer-span" data-start="${m.matchTime}">${getElapsed(m.matchTime)}</span></span>` : 
                            (isFinished ? `<span class="status-badge bg-slate-100 text-slate-500">Finished</span>` : 
                            `<span class="status-badge bg-blue-50 text-blue-600">Upcoming</span>`);

                const timeStr = start.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateStr = start.toLocaleDateString([], { day: 'numeric', month: 'short' });

                container.innerHTML += `
                    <div class="match-card p-5" onclick="showDetails('${m.id}')">
                        <div class="flex justify-between items-center mb-5">
                            <div class="league-info"><img src="${m.leagueLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5351/5351315.png'"><span>${m.leagueTitle}</span></div>
                            ${liveStatusStr}
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col items-center gap-2 w-[42%]"><img src="${m.team1Logo}" class="w-11 h-11 object-contain"><span class="font-black text-[10px] text-center uppercase text-slate-700 truncate w-full">${m.team1Name}</span></div>
                            <div class="text-[10px] font-black text-slate-200 italic">VS</div>
                            <div class="flex flex-col items-center gap-2 w-[42%]"><img src="${m.team2Logo}" class="w-11 h-11 object-contain"><span class="font-black text-[10px] text-center uppercase text-slate-700 truncate w-full">${m.team2Name}</span></div>
                        </div>
                        <div class="mt-5 pt-3 border-t border-slate-50 flex justify-between items-center">
                            <span class="text-[8px] font-black text-slate-400 uppercase tracking-widest">${dateStr} • ${timeStr}</span>
                            <span class="text-[8px] font-black text-rose-500 uppercase tracking-widest">Match Details <i class="fas fa-chevron-right ml-1"></i></span>
                        </div>
                    </div>`;
            });
        }

        function showDetails(id) {
            const m = allMatches.find(x => x.id == id);
            if(!m) return;
            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('home-tabs').classList.add('hidden');
            document.getElementById('date-context').classList.add('hidden');
            document.getElementById('main-footer').classList.add('hidden'); // Hide footer in details
            document.getElementById('details-view').classList.remove('hidden');
            
            document.getElementById('det-league-name').innerText = m.leagueTitle;
            document.getElementById('det-league-img').src = m.leagueLogo;
            document.getElementById('det-t1-name').innerText = m.team1Name;
            document.getElementById('det-t2-name').innerText = m.team2Name;
            document.getElementById('det-t1-img').src = m.team1Logo;
            document.getElementById('det-t2-img').src = m.team2Logo;
            const start = new Date(m.matchTime);
            document.getElementById('det-time-box').innerText = start.toLocaleString('en-US', { weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).toUpperCase();

            const bList = document.getElementById('broadcaster-list');
            bList.innerHTML = "";
            let foundChans = [];
            const cat = leaguePlaylists[m.sportType || "FOOTBALL"];
            if(cat) { Object.values(cat).forEach(it => { if(it.league && m.leagueTitle.toLowerCase().includes(it.league.toLowerCase())) foundChans = it.channels || []; }); }
            if(foundChans.length > 0) { foundChans.forEach(ch => { bList.innerHTML += `<div class="broadcaster-tag"><i class="fas fa-tv"></i> ${ch.name}</div>`; }); } 
            else { bList.innerHTML = `<span class="text-[9px] text-slate-400 italic">No listing available</span>`; }

            const sList = document.getElementById('server-list');
            sList.innerHTML = "";
            if(!m.streamLinks || m.streamLinks.length === 0) {
                sList.innerHTML = `<div class="p-5 bg-rose-50 text-rose-600 rounded-[24px] text-[9px] font-black text-center uppercase tracking-widest">Coming Soon...</div>`;
            } else {
                m.streamLinks.forEach((l, i) => {
                    sList.innerHTML += `<button onclick="startStreaming('${l.link}', '${m.team1Name} vs ${m.team2Name}')" class="flex items-center justify-between p-4 bg-slate-900 text-white rounded-[20px] font-bold text-xs shadow-lg active:scale-95 transition-all"><span><i class="fas fa-play-circle mr-3 text-rose-500"></i> ${l.name || 'SERVER ' + (i + 1)}</span><i class="fas fa-chevron-right opacity-30"></i></button>`;
                });
            }
            window.scrollTo(0,0);
        }

        function showHome() {
            document.getElementById('list-view').classList.remove('hidden');
            document.getElementById('home-tabs').classList.remove('hidden');
            document.getElementById('date-context').classList.remove('hidden');
            document.getElementById('main-footer').classList.remove('hidden'); // Show footer again
            document.getElementById('details-view').classList.add('hidden');
        }

        // Viewer Counter Logic
        let viewerInterval = null;
        function updateViewer() {
            const el = document.getElementById('player-viewer-count');
            let base = 12450;
            viewerInterval = setInterval(() => {
                let ran = Math.floor(Math.random() * 50) - 20;
                base += ran;
                el.innerText = base.toLocaleString();
            }, 3000);
        }

        let art = null;
        function startStreaming(url, title) {
            document.getElementById('player-match-title').innerText = title;
            document.getElementById('player-overlay').style.display = 'block';
            updateViewer();
            if (art) art.destroy();
            art = new Artplayer({
                container: '#artplayer', url: url, type: 'm3u8',
                customType: { m3u8: function(video, url) { if (Hls.isSupported()) { const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video); } else { video.src = url; } }, },
                autoplay: true, fullscreen: true, theme: '#e11d48',
            });
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            if (viewerInterval) clearInterval(viewerInterval);
            if (art) art.destroy();
        }
    </script>
</body>
</html>
