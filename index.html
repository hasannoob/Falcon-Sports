    <style>
        :root {
            --falcon-green: #00ff88;
            --falcon-red: #ff0000;
            --bg-deep: #06090f;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-deep); 
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }
        .page { flex: 1; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Branded Loader --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 100000;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-text {
            font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900;
            color: var(--falcon-green); letter-spacing: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        /* --- Header --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(6, 9, 15, 0.98); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--falcon-green); }

        /* --- Filter Tabs --- */
        .filter-tabs {
            display: flex; gap: 10px; padding: 10px 15px; background: #080c14;
            overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: 700;
            background: var(--card-glass); border: 1px solid var(--border);
            color: #888; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab.active { background: var(--falcon-green); color: #000; border-color: var(--falcon-green); }

        /* --- Home: Mini Match Card --- */
        .match-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .m-card {
            background: var(--card-glass); border-radius: 12px; padding: 12px;
            border: 1px solid var(--border); cursor: pointer; position: relative;
        }
        .m-card.live-border { border-color: var(--falcon-red); }
        
        .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .league-img { width: 16px; height: 16px; object-fit: contain; }
        .league-name { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; }

        .teams-mini { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .t-mini { display: flex; align-items: center; gap: 8px; flex: 1; }
        .t-mini img { width: 30px; height: 30px; object-fit: contain; }
        .t-mini span { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
        .vs-mini { font-size: 10px; font-weight: 900; color: #333; margin: 0 8px; font-family: 'Orbitron'; }

        .live-label-red { color: var(--falcon-red); font-family: 'Orbitron'; font-size: 9px; font-weight: 900; text-align: center; margin: 5px 0; animation: blink 1.2s infinite; }

        .card-channels { display: flex; justify-content: center; gap: 6px; margin-top: 5px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.1); }
        .chan-img { width: 20px; height: 20px; border-radius: 50%; background: #fff; padding: 2px; object-fit: contain; border: 1px solid rgba(255,255,255,0.1); }

        .card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
        .time-mini { font-size: 10px; color: #00d2ff; font-weight: 600; }
        .elapsed-timer-mini { font-family: 'Orbitron'; font-size: 9px; color: var(--falcon-red); font-weight: 700; }

        /* --- Updated Match Center (No Stadium Vibe) --- */
        .details-hero-clean {
            height: 240px;
            background: linear-gradient(135deg, #0a111a 0%, #06090f 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; border-bottom: 1px solid var(--border);
        }
        .clean-scoreboard {
            width: 90%; display: flex; align-items: center; justify-content: space-around;
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            padding: 30px 15px; border-radius: 15px;
        }
        .cs-team { text-align: center; flex: 1; }
        .cs-team img { width: 75px; height: 75px; margin-bottom: 10px; }
        .cs-team h3 { font-size: 14px; font-family: 'Rajdhani'; font-weight: 700; color: #fff; text-transform: uppercase; }
        .cs-vs { font-family: 'Orbitron'; font-size: 22px; color: var(--falcon-green); text-shadow: 0 0 10px var(--falcon-green); }

        .server-section { padding: 25px 15px; background: var(--bg-deep); }
        .server-card {
            background: #101418; padding: 15px; border-radius: 12px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); cursor: pointer;
        }
        .s-icon-box { width: 35px; height: 35px; background: var(--falcon-green); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* --- Advanced Player Elements --- */
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; overflow: hidden; }
        #iframe-player { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; z-index: 10; }
        #artplayer-app { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 5; }

        .live-viewer-box { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: #ff4757; text-transform: uppercase; background: rgba(255,255,255,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,71,87,0.3); margin-top: 10px; }
        .live-dot-lg { width: 8px; height: 8px; background: #ff4757; border-radius: 50%; box-shadow: 0 0 8px #ff4757; animation: blinkLive 1.5s infinite; }
        
        .art-layer-qualityModal { display: none; position: absolute; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; width: 280px; max-height: 80%; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 10px; text-align: center; font-weight: bold; color: #fff; background: #222; border-bottom: 1px solid #333; }
        .modal-body { flex: 1; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 4px; }
        .q-option { padding: 10px; background: #2b2b2b; color: #ccc; border-radius: 4px; font-size: 14px; display: flex; justify-content: space-between; cursor: pointer; }
        .q-option.active { background: var(--falcon-green); color: black; font-weight: bold; }
        .modal-close { padding: 10px; text-align: center; color: #ff4757; font-weight: bold; cursor: pointer; border-top: 1px solid #333; background: #222; }

        footer { padding: 25px; background: #04060a; text-align: center; border-top: 1px solid var(--border); font-size: 11px; color: #555; margin-top: auto; }
        footer b { color: var(--falcon-green); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        @keyframes blinkLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>

        const icons = {
            globe: '<svg width="22" height="22" viewBox="0 0 24 24" fill="#ffffff"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>',
            gear: '<svg width="22" height="22" viewBox="0 0 24 24" fill="#ffffff"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>',

        };

        let qualityLevelsData = [];
        let currentQualityIndex = -1;
        let setQualityFunction = null;

        function getElapsed(startTime) {
            const diff = new Date() - new Date(startTime);
            if (diff < 0) return "00:00:00";
            const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function updateFakeCounter() {
            const el = document.getElementById('live-count-num');
            if(!el) return;
            let current = parseInt(el.innerText.replace(/,/g, ''));
            let change = Math.floor(Math.random() * 40) - 15; 
            let newVal = current + change;
            if(newVal < 500) newVal = 500 + Math.floor(Math.random()*100); 
            el.innerText = newVal.toLocaleString();
        }

        function renderHome() {
            const container = document.getElementById('match-container');
            container.innerHTML = "";
            const now = new Date();

            let filtered = matches.filter(m => {
                const s = new Date(m.matchTime), e = m.matchEndTime ? new Date(m.matchEndTime) : new Date(s.getTime() + 4*3600000);
                if(activeTab === 'live') return (now >= s && now <= e);
                if(activeTab === 'upcoming') return (now < s);
                if(activeTab === 'ended') return (now > e);
                return (now <= e);
            });

            filtered.sort((a,b) => {
                const sA = new Date(a.matchTime), sB = new Date(b.matchTime);
                const liveA = (now >= sA && now <= (a.matchEndTime ? new Date(a.matchEndTime) : new Date(sA.getTime() + 4*3600000)));
                const liveB = (now >= sB && now <= (b.matchEndTime ? new Date(b.matchEndTime) : new Date(sB.getTime() + 4*3600000)));
                if(liveA && !liveB) return -1;
                if(!liveA && liveB) return 1;
                return sA - sB;
            });

            filtered.forEach(m => {
                const start = new Date(m.matchTime);
                const isLive = (now >= start && now <= (m.matchEndTime ? new Date(m.matchEndTime) : new Date(start.getTime() + 4*3600000)));
                let chanLogos = "";
                if(m.streamLinks) m.streamLinks.forEach(l => { if(l.logo) chanLogos += `<img src="${PROXY}${l.logo}" class="chan-img">`; });

                const card = document.createElement('div');
                card.className = `m-card ${isLive ? 'live-border' : ''}`;
                card.innerHTML = `
                    <div class="card-head"><img src="${PROXY}${m.leagueLogo}" class="league-img"> <span class="league-name">${m.leagueTitle}</span></div>
                    <div class="teams-mini">
                        <div class="t-mini"><img src="${PROXY}${m.team1Logo}"><span>${m.team1Name}</span></div>
                        <div class="vs-mini">VS</div>
                        <div class="t-mini" style="flex-direction:row-reverse; text-align:right;"><img src="${PROXY}${m.team2Logo || m.teamZLogo}"><span>${m.team2Name}</span></div>
                    </div>
                    ${isLive ? `<div class="live-label-red">LIVE</div>` : ''}
                    <div class="card-channels">${chanLogos}</div>
                    <div class="card-foot">
                        <div class="time-mini">${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        ${isLive ? `<div class="elapsed-timer-mini">${getElapsed(m.matchTime)}</div>` : `<div style="font-size:9px;color:#555;">${start.toLocaleDateString([], {day:'numeric',month:'short'})}</div>`}
                    </div>
                `;
                card.onclick = () => showPage('details', m);
                container.appendChild(card);
            });
        }

        function setTab(tab, btn) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderHome();
        }

        function showPage(pageId, data = null) {
            if (!history.state || history.state.page !== pageId) {
                history.pushState({page: pageId, data: data}, "", "#" + pageId);
            }
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');

            if(pageId === 'details') {
                document.getElementById('scoreboard-data').innerHTML = `
                    <div class="cs-team"><img src="${PROXY}${data.team1Logo}"><h3>${data.team1Name}</h3></div>
                    <div class="cs-vs">VS</div>
                    <div class="cs-team"><img src="${PROXY}${data.team2Logo || data.teamZLogo}"><h3>${data.team2Name}</h3></div>
                `;
                const linkBox = document.getElementById('links-container');
                linkBox.innerHTML = "";
                data.streamLinks.forEach((l, i) => {
                    const btn = document.createElement('div');
                    btn.className = "server-card";
                    btn.innerHTML = `<div style="display:flex;align-items:center;gap:12px;"><div class="s-icon-box"><i class="fa-solid fa-play"></i></div><b>${l.name || 'SERVER '+(i+1)}</b></div><i class="fa-solid fa-chevron-right" style="color:#444"></i>`;
                    btn.onclick = () => {
                        adCount++;
                        if(adCount % 2 === 0) window.open(SMARTLINK, "_blank");
                        showPage('player', {link: l.link, api: l.api, name: data.team1Name + " vs " + data.team2Name, sport: data.sportType});
                    };
                    linkBox.appendChild(btn);
                });
            }

            if(pageId === 'player') {
                document.getElementById('player-match-name').innerText = data.name;
                if(counterInterval) clearInterval(counterInterval);
                let baseCount = data.sport?.toLowerCase().includes('cricket') ? 5200 : (data.sport?.toLowerCase().includes('football') ? 8500 : 1200);
                document.getElementById('live-count-num').innerText = (baseCount + Math.floor(Math.random() * 500)).toLocaleString();
                counterInterval = setInterval(updateFakeCounter, 45000);
                initAdvancedPlayer(data.link, data.api);
            } else {
                if(art) { art.destroy(); art = null; }
                if(counterInterval) clearInterval(counterInterval);
                document.getElementById('iframe-player').src = "";
            }
        }

        function initAdvancedPlayer(url, drm) {
            const artEl = document.getElementById('artplayer-app');
            const iframeEl = document.getElementById('iframe-player');
            if(art) { art.destroy(); art = null; }
            iframeEl.src = ""; iframeEl.classList.add('hidden'); artEl.classList.add('hidden');

            const isDirect = url.includes(".m3u8") || url.includes(".mpd") || url.includes(".mp4");
            const isIframe = url.includes("<iframe");

            if (isDirect && !isIframe) {
                artEl.classList.remove('hidden');
                qualityLevelsData = []; currentQualityIndex = -1;

                art = new Artplayer({
                    container: '#artplayer-app', url: url, autoplay: true, fullscreen: true, pip: true, setting: false, theme: '#00ff88',
                    layers: [{ name: 'qualityModal', html: `<div class="modal-box"><div class="modal-header">Quality Selection</div><div class="modal-body" id="qList"></div><div class="modal-close" id="qClose">Close</div></div>` }],
                    controls: [
                        { name: 'qualityBtn', position: 'right', html: icons.gear, index: 10, click: () => buildQualityUI() },
                        { name: 'audioList', position: 'right', html: icons.globe, index: 11, selector: [] },
                        { name: 'aspectRatio', position: 'right', html: icons.aspect, index: 12, selector: [{html:'Default',url:'default',default:true},{html:'16:9',url:'16:9'},{html:'4:3',url:'4:3'}], onSelect: (i)=>art.aspectRatio=i.url }
                    ],
                    customType: {
                        mpd: (video, url, art) => {
                            const player = dashjs.MediaPlayer().create();
                            player.initialize(video, url, true);
                            if (drm && drm.includes(':')) {
                                const [kid, key] = drm.split(':');
                                player.setProtectionData({ "org.w3.clearkey": { "clearkeys": { [kid]: key } } });
                            }
                            player.on(dashjs.MediaPlayer.events.STREAM_INITIALIZED, () => {
                                const audioTracks = player.getTracksFor('audio');
                                const audioList = audioTracks.map((t, i) => ({ default: t === player.getCurrentTrackFor('audio'), html: t.lang || `Audio ${i+1}`, index: t }));
                                art.controls.update({ name: 'audioList', html: icons.globe, selector: audioList, onSelect: (item) => { player.setCurrentTrack(item.index); return icons.globe; } });
                                const vQ = player.getBitrateInfoListFor('video');
                                qualityLevelsData = vQ.map((q, i) => ({ height: q.height, bitrate: Math.round(q.bitrate/1000)+'kbps', index: i }));
                                setQualityFunction = (idx) => {
                                    if(idx===-1) player.updateSettings({'streaming':{'abr':{'autoSwitchBitrate':{'video':true}}}});
                                    else { player.updateSettings({'streaming':{'abr':{'autoSwitchBitrate':{'video':false}}}}); player.setQualityFor('video', idx); }
                                    currentQualityIndex = idx;
                                };
                            });
                        },
                        m3u8: (video, url, art) => {
                            if (Hls.isSupported()) {
                                const hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                                    const audioList = hls.audioTracks.map((t, i) => ({ html: t.name || t.lang || `Audio ${i+1}`, index: i, default: i === hls.audioTrack }));
                                    art.controls.update({ name: 'audioList', html: icons.globe, selector: audioList, onSelect: (item) => { hls.audioTrack = item.index; return icons.globe; } });
                                    qualityLevelsData = hls.levels.map((l, i) => ({ height: l.height, bitrate: Math.round(l.bitrate/1000)+'kbps', index: i }));
                                    setQualityFunction = (idx) => { hls.currentLevel = idx; currentQualityIndex = idx; };
                                });
                            }
                        }
                    }
                });

                art.on('ready', () => {
                    const layer = art.layers.qualityModal;
                    layer.querySelector('#qClose').onclick = (e) => { e.stopPropagation(); layer.style.display = 'none'; };
                });
            } else {
                iframeEl.classList.remove('hidden');
                if (isIframe) {
                    const temp = document.createElement('div'); temp.innerHTML = url;
                    const ifr = temp.querySelector('iframe'); iframeEl.src = ifr ? ifr.src : "";
                } else { iframeEl.src = url; }
            }
        }

        function buildQualityUI() {
            if(qualityLevelsData.length === 0) return;
            const modal = art.layers.qualityModal;
            const list = modal.querySelector('#qList');
            list.innerHTML = `<div class="q-option ${currentQualityIndex===-1?'active':''}" onclick="applyQ(-1)"><span>Auto</span><span>Adaptive</span></div>`;
            [...qualityLevelsData].reverse().forEach(lvl => {
                const opt = document.createElement('div');
                opt.className = `q-option ${currentQualityIndex===lvl.index?'active':''}`;
                opt.innerHTML = `<span>${lvl.height}p</span><span>${lvl.bitrate}</span>`;
                opt.onclick = () => applyQ(lvl.index);
                list.appendChild(opt);
            });
            modal.style.display = 'flex';
        }

        function applyQ(idx) { if(setQualityFunction) setQualityFunction(idx); art.layers.qualityModal.style.display='none'; }

        window.onpopstate = function(e) {
            const pageId = (e.state && e.state.page) ? e.state.page : 'home';
            const data = (e.state && e.state.data) ? e.state.data : null;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            if(pageId !== 'player') { if(art) {art.destroy(); art=null;} document.getElementById('iframe-player').src=""; }
        };

        window.onload = () => {
            db.ref('/matches').on('value', (snap) => {
                matches = Object.values(snap.val() || {});
                renderHome();
                setTimeout(() => { document.getElementById('loader').style.display='none'; }, 2000);
            });
            setInterval(() => { if(activeTab === 'all' || activeTab === 'live') renderHome(); }, 1000);
            if(!history.state) history.replaceState({page: 'home'}, "", "#home");
        };
    </script>
</body>
</html>
