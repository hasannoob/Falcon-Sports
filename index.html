<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Sports - Ultimate Live</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Rajdhani:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dashjs/dist/dash.all.min.js"></script>

    <style>
        :root {
            --falcon-green: #00ff88;
            --falcon-red: #ff0000;
            --bg-deep: #06090f;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --neon-blue: #00d2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-deep); 
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }
        .page { flex: 1; width: 100%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Branded Loader --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg-deep); z-index: 100000;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-text {
            font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900;
            color: var(--falcon-green); letter-spacing: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }

        /* --- Header --- */
        header {
            padding: 12px 15px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(6, 9, 15, 0.98); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .brand { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 700; color: var(--falcon-green); }

        /* --- Filter Tabs --- */
        .filter-tabs {
            display: flex; gap: 10px; padding: 10px 15px; background: #080c14;
            overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border);
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 6px 15px; border-radius: 20px; font-size: 11px; font-weight: 700;
            background: var(--card-glass); border: 1px solid var(--border);
            color: #888; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab.active { background: var(--falcon-green); color: #000; border-color: var(--falcon-green); }

        /* --- Mini Match Card --- */
        .match-list { padding: 12px; display: flex; flex-direction: column; gap: 12px; }
        .m-card {
            background: var(--card-glass); border-radius: 12px; padding: 12px;
            border: 1px solid var(--border); cursor: pointer; position: relative;
        }
        .m-card.live-border { border-color: var(--falcon-red); }
        
        .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
        .league-img { width: 16px; height: 16px; object-fit: contain; }
        .league-name { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }

        .teams-mini { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
        .t-mini { display: flex; align-items: center; gap: 8px; flex: 1; }
        .t-mini img { width: 30px; height: 30px; object-fit: contain; }
        .t-mini span { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
        .vs-mini { font-size: 10px; font-weight: 900; color: #333; margin: 0 8px; font-family: 'Orbitron'; }

        /* Middle Live Badge */
        .live-badge-mid {
            text-align: center; color: var(--falcon-red); font-family: 'Orbitron';
            font-size: 10px; font-weight: 900; letter-spacing: 1px; margin: 5px 0;
            animation: blink 1.5s infinite;
        }

        .card-channels { display: flex; justify-content: center; gap: 6px; margin-top: 5px; padding-top: 8px; border-top: 1px dotted rgba(255,255,255,0.1); }
        .chan-img { width: 18px; height: 18px; border-radius: 50%; background: #fff; padding: 2px; object-fit: contain; }

        .card-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .time-mini { font-size: 10px; color: var(--neon-blue); font-weight: 600; }
        .elapsed-timer-mini { font-family: 'Orbitron'; font-size: 9px; color: var(--falcon-red); font-weight: 700; }
        .date-mini { font-size: 9px; color: #555; }

        /* --- Unique Match Center (Details Page) --- */
        .details-container { padding: 0; background: #05070a; }
        .details-hero {
            height: 280px; background: linear-gradient(to bottom, #0a0f18, #05070a), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
            border-bottom: 1px solid var(--falcon-green);
        }
        .stadium-lights {
            position: absolute; top: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 255, 136, 0.15), transparent 70%);
        }
        .vs-bg-text {
            position: absolute; font-family: 'Orbitron'; font-size: 80px; font-weight: 900;
            color: rgba(255,255,255,0.02); z-index: 1; letter-spacing: 10px;
        }
        .team-box-large { z-index: 2; display: flex; align-items: center; justify-content: space-around; width: 100%; padding: 0 15px; }
        .d-team-info { text-align: center; flex: 1; }
        .d-team-info img { width: 85px; height: 85px; object-fit: contain; filter: drop-shadow(0 0 10px rgba(0,255,136,0.2)); margin-bottom: 12px; }
        .d-team-info h3 { font-size: 16px; font-family: 'Rajdhani'; font-weight: 700; color: #fff; text-transform: uppercase; }
        .vs-glow-mid { font-family: 'Orbitron'; font-size: 26px; color: var(--falcon-green); text-shadow: 0 0 15px var(--falcon-green); font-weight: 900; }

        .server-section { padding: 25px 20px; background: #05070a; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; }
        .server-card {
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .server-card:active { border-color: var(--falcon-green); transform: scale(0.97); background: rgba(0,255,136,0.05); }
        .server-meta { display: flex; align-items: center; gap: 15px; }
        .server-icon { width: 38px; height: 38px; background: var(--falcon-green); color: #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        /* --- Footer --- */
        footer { padding: 25px; background: #04060a; text-align: center; border-top: 1px solid var(--border); font-size: 11px; color: #555; margin-top: auto; }
        footer b { color: var(--falcon-green); }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <!-- BRANDED LOADER -->
    <div id="loader"><div class="loader-text">FALCON</div></div>

    <!-- HOME PAGE -->
    <div id="page-home" class="page">
        <header>
            <div class="brand">FALCON SPORTS</div>
            <div style="display:flex; gap:12px;">
                <a href="https://t.me/falconsports1" style="color:#25d366; font-size:20px;"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="https://t.me/falconsports1" style="color:#0088cc; font-size:20px;"><i class="fa-brands fa-telegram"></i></a>
            </div>
        </header>

        <div class="filter-tabs">
            <div class="tab active" onclick="setFilter('all', this)">ALL</div>
            <div class="tab" onclick="setFilter('live', this)">LIVE</div>
            <div class="tab" onclick="setFilter('upcoming', this)">UPCOMING</div>
            <div class="tab" onclick="setFilter('ended', this)">ENDED</div>
        </div>

        <div class="match-list" id="match-container"></div>
    </div>

    <!-- DETAILS PAGE (Match Center) -->
    <div id="page-details" class="page hidden details-container">
        <header>
            <i class="fa-solid fa-arrow-left" onclick="history.back()" style="cursor:pointer"></i>
            <div class="brand">MATCH CENTER</div>
            <div></div>
        </header>
        <div class="details-hero">
            <div class="stadium-lights"></div>
            <div class="vs-bg-text">FALCON</div>
            <div class="team-box-large" id="details-teams"></div>
        </div>
        <div class="server-section">
            <h4 style="margin-bottom: 18px; font-family:'Rajdhani'; color:var(--falcon-green); letter-spacing:1px; font-size:14px;">SELECT HD STREAM SERVER</h4>
            <div id="links-container"></div>
        </div>
    </div>

    <!-- PLAYER PAGE -->
    <div id="page-player" class="page hidden" style="background: #000;">
        <header style="background:#000; border-bottom: 1px solid #222;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()" style="color:white; cursor:pointer"></i>
            <span style="font-size:13px; font-weight:600; color:var(--falcon-green); font-family:'Orbitron';">ULTRA HD PLAYER</span>
            <div></div>
        </header>
        <div class="video-box" style="width:100%; aspect-ratio:16/9; position:relative;">
            <div id="artplayer-app" style="width: 100%; height: 100%;"></div>
            <iframe id="iframe-player" class="hidden" style="width:100%; height:100%; border:none; position:absolute; top:0;" allowfullscreen allow="autoplay"></iframe>
        </div>
        <div style="padding:25px; text-align:center;">
            <p id="player-match-name" style="font-size:15px; font-weight:700; margin-bottom:20px; font-family:'Rajdhani'; color:#aaa;"></p>
            <div style="display:flex; gap:10px;">
                <a href="https://t.me/falconsports1" style="flex:1; background:#0088cc; padding:12px; border-radius:12px; text-decoration:none; color:#fff; font-size:12px; font-weight:700;">Join Telegram</a>
                <a href="https://t.me/falconsports1" style="flex:1; background:#25d366; padding:12px; border-radius:12px; text-decoration:none; color:#fff; font-size:12px; font-weight:700;">Join WhatsApp</a>
            </div>
        </div>
    </div>

    <footer>
        <p>Copyright © 2025 <b>FALCON SPORTS</b>. All Rights Reserved.</p>
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBcROeTFNV6haP8ZrnIFH2iuC9oNS6Ccvc",
            authDomain: "live-bd-24.firebaseapp.com",
            databaseURL: "https://live-bd-24-default-rtdb.firebaseio.com",
            projectId: "live-bd-24",
            storageBucket: "live-bd-24.firebasestorage.app",
            messagingSenderId: "171477012668",
            appId: "1:171477012668:web:f2e694da9474ef236e40b9"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const PROXY = "https://external-content.duckduckgo.com/iu/?u=";
        const SMARTLINK = "https://www.effectivegatecpm.com/zdqc4sm7qt?key=2ee33388356594706e35bcca2fde65ed";
        
        let matches = [];
        let art = null;
        let currentFilter = 'all';
        let adCount = 0;

        function getElapsed(startTime) {
            const diff = new Date() - new Date(startTime);
            if (diff < 0) return "00:00:00";
            const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function renderHome() {
            const container = document.getElementById('match-container');
            container.innerHTML = "";
            const now = new Date();

            let filtered = matches.filter(m => {
                const s = new Date(m.matchTime);
                const e = m.matchEndTime ? new Date(m.matchEndTime) : new Date(s.getTime() + 4*3600000);
                if(currentFilter === 'live') return (now >= s && now <= e);
                if(currentFilter === 'upcoming') return (now < s);
                if(currentFilter === 'ended') return (now > e);
                return (now <= e); 
            });

            filtered.sort((a,b) => {
                const sA = new Date(a.matchTime), sB = new Date(b.matchTime);
                const liveA = (now >= sA && now <= (a.matchEndTime ? new Date(a.matchEndTime) : new Date(sA.getTime() + 4*3600000)));
                const liveB = (now >= sB && now <= (b.matchEndTime ? new Date(b.matchEndTime) : new Date(sB.getTime() + 4*3600000)));
                if(liveA && !liveB) return -1;
                if(!liveA && liveB) return 1;
                return sA - sB;
            });

            filtered.forEach(m => {
                const start = new Date(m.matchTime);
                const end = m.matchEndTime ? new Date(m.matchEndTime) : new Date(start.getTime() + 4*3600000);
                const isLive = (now >= start && now <= end);

                let chanLogos = "";
                if(m.streamLinks) m.streamLinks.forEach(l => { if(l.logo) chanLogos += `<img src="${PROXY}${l.logo}" class="chan-img">`; });

                const card = document.createElement('div');
                card.className = `m-card ${isLive ? 'live-border' : ''}`;
                card.innerHTML = `
                    <div class="card-head">
                        <img src="${PROXY}${m.leagueLogo}" class="league-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5358/5358643.png'">
                        <span class="league-name">${m.leagueTitle}</span>
                    </div>
                    <div class="teams-mini">
                        <div class="t-mini"><img src="${PROXY}${m.team1Logo}"><span>${m.team1Name}</span></div>
                        <div class="vs-mini">VS</div>
                        <div class="t-mini" style="flex-direction:row-reverse; text-align:right;"><img src="${PROXY}${m.team2Logo || m.teamZLogo}"><span>${m.team2Name}</span></div>
                    </div>
                    ${isLive ? `<div class="live-badge-mid">LIVE</div>` : ''}
                    <div class="card-channels">${chanLogos}</div>
                    <div class="card-foot">
                        <div class="time-mini">${start.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        ${isLive ? `<div class="elapsed-timer-mini">${getElapsed(m.matchTime)}</div>` : `<div class="date-mini">${start.toLocaleDateString([], {day:'numeric', month:'short'})}</div>`}
                    </div>
                `;
                card.onclick = () => switchPage('details', m);
                container.appendChild(card);
            });
        }

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderHome();
        }

        function switchPage(pageId, data = null) {
            if (!history.state || history.state.page !== pageId) {
                history.pushState({page: pageId, data: data}, "", "#" + pageId);
            }
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            window.scrollTo(0,0);

            if(pageId === 'details') {
                document.getElementById('details-teams').innerHTML = `
                    <div class="d-team-info"><img src="${PROXY}${data.team1Logo}"><h3>${data.team1Name}</h3></div>
                    <div class="vs-glow-mid">VS</div>
                    <div class="d-team-info"><img src="${PROXY}${data.team2Logo || data.teamZLogo}"><h3>${data.team2Name}</h3></div>
                `;
                const linkBox = document.getElementById('links-container');
                linkBox.innerHTML = "";
                data.streamLinks.forEach((l, i) => {
                    const btn = document.createElement('div');
                    btn.className = "server-card";
                    btn.innerHTML = `
                        <div class="server-meta">
                            <div class="server-icon"><i class="fa-solid fa-bolt"></i></div>
                            <div>
                                <b style="font-size:13px; display:block;">${l.name || 'SERVER '+(i+1)}</b>
                                <span style="font-size:10px; color:#666;">High Speed Ultra HD</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-circle-play" style="color:var(--falcon-green); font-size:22px;"></i>
                    `;
                    btn.onclick = () => {
                        adCount++;
                        if(adCount % 2 === 0) window.open(SMARTLINK, "_blank");
                        switchPage('player', {link: l.link, api: l.api, name: data.team1Name + " vs " + data.team2Name});
                    };
                    linkBox.appendChild(btn);
                });
            }

            if(pageId === 'player') {
                document.getElementById('player-match-name').innerText = data.name;
                initPlayer(data.link, data.api);
            } else {
                if(art) { art.destroy(); art = null; }
                document.getElementById('iframe-player').src = "";
            }
        }

        function initPlayer(url, drm) {
            const artEl = document.getElementById('artplayer-app');
            const iframeEl = document.getElementById('iframe-player');
            if (url.includes("<iframe") || !url.includes(".") || (!url.includes(".m3u8") && !url.includes(".mpd") && !url.includes(".mp4"))) {
                artEl.classList.add('hidden'); iframeEl.classList.remove('hidden');
                if (url.includes("<iframe")) {
                    const temp = document.createElement('div'); temp.innerHTML = url;
                    iframeEl.src = temp.querySelector('iframe') ? temp.querySelector('iframe').src : "";
                } else { iframeEl.src = url; }
            } else {
                iframeEl.classList.add('hidden'); artEl.classList.remove('hidden');
                if(art) art.destroy();
                art = new Artplayer({
                    container: '#artplayer-app', url: url, autoplay: true, fullscreen: true, theme: '#00ff88',
                    customType: {
                        m3u8: (v, u) => { if(Hls.isSupported()){ const hls=new Hls(); hls.loadSource(u); hls.attachMedia(v); }
                                         else if(v.canPlayType('application/vnd.apple.mpegurl')){ v.src = u; }},
                        mpd: (v, u) => { const p = dashjs.MediaPlayer().create(); p.initialize(v, u, true);
                            if(drm) { const [k,val]=drm.split(':'); p.setProtectionData({"org.w3.clearkey":{"clearkeys":{[k]:val}}}); }
                        }
                    }
                });
            }
        }

        window.onpopstate = function(event) {
            const pageId = (event.state && event.state.page) ? event.state.page : 'home';
            const data = (event.state && event.state.data) ? event.state.data : null;
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            if(pageId !== 'player') { if(art) { art.destroy(); art = null; } document.getElementById('iframe-player').src = ""; }
        };

        window.onload = () => {
            db.ref('/matches').on('value', (snap) => {
                matches = Object.values(snap.val() || {});
                renderHome();
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 2000);
            });
            setInterval(() => { if(currentFilter === 'all' || currentFilter === 'live') renderHome(); }, 1000);
            if(!history.state) history.replaceState({page: 'home'}, "", "#home");
        };
    </script>
</body>
</html>
